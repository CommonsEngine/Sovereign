<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sovereign — Offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #020617;
        color: #e2e8f0;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        background: radial-gradient(circle at top, #0b1121, #020617 60%);
      }

      .card {
        text-align: center;
        max-width: 26rem;
        border: 1px solid rgba(148, 163, 184, 0.3);
        border-radius: 1rem;
        padding: 2rem;
        backdrop-filter: blur(6px);
        background-color: rgba(2, 6, 23, 0.85);
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.75);
      }

      .card h1 {
        margin-top: 0;
        font-size: 1.75rem;
      }

      .card p {
        line-height: 1.5;
      }

      .card button {
        margin-top: 1.5rem;
        border: none;
        background: #22d3ee;
        color: #0f172a;
        font-weight: 600;
        padding: 0.85rem 1.5rem;
        border-radius: 999px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You’re offline</h1>
      <p>Sovereign can’t reach the network right now. Reconnect to continue collaborating.</p>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </div>
  </body>
</html>
