<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>{{head.title}}</title>

{{#if head.meta}}
  {{#each head.meta}}
    {{#if name}}
<meta name="{{name}}" content="{{content}}"{{#if media}} media="{{media}}"{{/if}}{{#if id}} id="{{id}}"{{/if}} />
    {{else}}
      {{#if property}}
<meta property="{{property}}" content="{{content}}"{{#if media}} media="{{media}}"{{/if}}{{#if id}} id="{{id}}"{{/if}} />
      {{else}}
        {{#if httpEquiv}}
<meta http-equiv="{{httpEquiv}}" content="{{content}}"{{#if media}} media="{{media}}"{{/if}}{{#if id}} id="{{id}}"{{/if}} />
        {{/if}}
      {{/if}}
    {{/if}}
  {{/each}}
{{/if}}

{{#if head.link}}
  {{#each head.link}}
<link rel="{{rel}}" href="{{href}}"{{#if as}} as="{{as}}"{{/if}}{{#if type}} type="{{type}}"{{/if}}{{#if hreflang}} hreflang="{{hreflang}}"{{/if}}{{#if media}} media="{{media}}"{{/if}}{{#if sizes}} sizes="{{sizes}}"{{/if}}{{#if crossorigin}} crossorigin="{{crossorigin}}"{{/if}}{{#if referrerpolicy}} referrerpolicy="{{referrerpolicy}}"{{/if}}{{#if integrity}} integrity="{{integrity}}"{{/if}}{{#if fetchpriority}} fetchpriority="{{fetchpriority}}"{{/if}}{{#if title}} title="{{title}}"{{/if}} />
  {{/each}}
{{/if}}

<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
<link rel="manifest" href="/manifest.webmanifest" />
<meta name="application-name" content="{{app.name}}" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black" />
<meta name="apple-mobile-web-app-title" content="{{app.name}}" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#0B1121" />
<meta name="msapplication-TileColor" content="#0B1121" />
<link rel="apple-touch-icon" sizes="192x192" href="/assets/icons/maskable-icon-192.png" />
<link rel="apple-touch-icon" sizes="512x512" href="/assets/icons/maskable-icon-512.png" />
<link rel="icon" type="image/png" sizes="192x192" href="/assets/icons/icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="/assets/icons/icon-512.png" />
<link rel="stylesheet" href="/css/sv_base.css?v={{#if head.cacheBuster}}{{head.cacheBuster}}{{else}}{{app.version}}{{/if}}" />
<link rel="stylesheet" href="/css/sv_styled.css?v={{#if head.cacheBuster}}{{head.cacheBuster}}{{else}}{{app.version}}{{/if}}" />
<link rel="stylesheet" href="/css/sv_utility.css?v={{#if head.cacheBuster}}{{head.cacheBuster}}{{else}}{{app.version}}{{/if}}" />

{{#if styles}} {{#each styles}}
<link rel="stylesheet" href="{{this}}" />
{{/each}} {{/if}} {{{pluginHead}}}
